<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BAWF Morphological Database</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color:#111827; }
    .container { max-width: 2800px; margin: 30px auto; padding: 32px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .db-table { width: 100%; border-collapse: collapse; user-select: none; }
    .db-table th, .db-table td { padding: 10px; border: 1px solid #e5e7eb; cursor: cell; }
    .db-table th { background: #1d4ed8; color: white; position: sticky; top: 0; }
    .db-table td.selected { background: #bfdbfe !important; }
    .db-table-wrap { overflow: auto; max-height: 70vh; }
    .db-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .db-btn { padding: 8px 16px; border-radius: 6px; border: none; background: #1d4ed8; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Morphological Database</h1>
    <div class="db-controls">
      <button class="db-btn" onclick="copySelected()">📋 Copy Selection (Ctrl+C)</button>
    </div>
    <div class="db-table-wrap">
      <table id="wfTable" class="db-table">
        <thead><tr id="wfHeaderRow"></tr></thead>
        <tbody id="wfTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let isSelecting = false;
    let startCell = null;
    let selectedCells = new Set();

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'c') copySelected();
    });

    function handleMouseDown(e) {
      if (e.target.tagName !== 'TD') return;
      isSelecting = true;
      clearSelection();
      startCell = e.target;
      selectCell(e.target);
    }

    function handleMouseEnter(e) {
      if (isSelecting && e.target.tagName === 'TD') selectCell(e.target);
    }

    function handleMouseUp() { isSelecting = false; }

    function selectCell(td) {
      td.classList.add('selected');
      selectedCells.add(td);
    }

    function clearSelection() {
      selectedCells.forEach(td => td.classList.remove('selected'));
      selectedCells.clear();
    }

    function copySelected() {
      if (selectedCells.size === 0) return;
      const rows = {};
      selectedCells.forEach(td => {
        const rowIdx = td.parentElement.rowIndex;
        const colIdx = td.cellIndex;
        if (!rows[rowIdx]) rows[rowIdx] = {};
        rows[rowIdx][colIdx] = td.innerText;
      });
      const sortedRowIndices = Object.keys(rows).sort((a,b) => a-b);
      let text = "";
      sortedRowIndices.forEach(r => {
        const row = rows[r];
        const cols = Object.keys(row).sort((a,b) => a-b);
        text += cols.map(c => row[c]).join('\t') + "\n";
      });
      navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
    }

    // Initialize with default columns
    const DEFAULT_COLS = ["Word", "Word_frq_Zipf", "Baseword", "Greek_Latin_Root_1", "Greek_Latin_Meaning_1", "GPT_Coded_Word_Parts", "Prefix_1", "Suffix_1", "N_Morphemes"];
    
    // ... [Rest of the existing logic for loading/rendering remains as optimized in previous step]
    
    document.querySelector('#wfTableBody').addEventListener('mousedown', handleMouseDown);
    document.querySelector('#wfTableBody').addEventListener('mouseover', handleMouseEnter);
    document.addEventListener('mouseup', handleMouseUp);
  </script>
</body>
</html>
